apiVersion: apps/v1
kind: Deployment
metadata:
  name: fayen-deployment
  namespace: fayen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fayen
  template:
    metadata:
      labels:
        app: fayen
    spec:
      containers:
        - name: fayen
          image: yassenmeckawy74/fayen-lms@sha256:2825478702131ac32eef0d70d2c4f97e8516c0c449cd0c85dca73a1e85c77765
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: fayen-config
            - secretRef:
                name: fayen-secret
          readinessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
